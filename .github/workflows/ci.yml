name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: src
        run: npm ci

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/package-lock.json') }}

      - name: Run tests with coverage
        working-directory: src
        run: npm test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: src/coverage/

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep — SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"

      - name: Trivy — filesystem SCA (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: src/
          exit-code: "1"
          severity: CRITICAL

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t taskapi:${{ github.sha }} .

      - name: Trivy — image scan (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: taskapi:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX)
        run: syft taskapi:${{ github.sha }} -o cyclonedx-json > sbom-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulate Kubernetes deployment
        run: echo "kubectl set image deployment/taskapi app=taskapi:${{ github.sha }}"
