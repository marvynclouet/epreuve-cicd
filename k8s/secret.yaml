  # echo -n 'changeme' | base64
  DB_PASSWORD: Y2hhbmdlbWU=
  # echo -n 'taskdb' | base64
  DB_NAME: dGFza2Ri
  # echo -n 'redis://redis:6379' | base64
  REDIS_URL: cmVkaXM6Ly9yZWRpczs2Mzc5
